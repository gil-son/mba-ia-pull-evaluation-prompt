name: leonanluppi/bug_to_user_story_v1
version: v1
description: Prompt original (baixa qualidade) extraído do LangSmith Prompt Hub.
input_variables:
- bug_report
messages:
- role: system
  content: 'Você é um assistente que ajuda a transformar relatos de bugs de usuários
    em tarefas para desenvolvedores.


    Analise o relato de bug abaixo e crie uma user story a partir dele.


    Relato de Bug:

    ---

    {bug_report}

    ---


    User Story gerada:

    '
- role: human
  content: '{bug_report}'
metadata:
  source: https://smith.langchain.com/hub/leonanluppi/bug_to_user_story_v1
  quality: low
  techniques: []
